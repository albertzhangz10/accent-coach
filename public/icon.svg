<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="216" y="120" width="80" height="160" rx="40" fill="url(#accent)"/>
  <!-- Mic arc -->
  <path d="M176 260 a80 80 0 0 0 160 0" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="256" y1="340" x2="256" y2="380" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <!-- Sound waves -->
  <path d="M340 180 a60 80 0 0 1 0 100" fill="none" stroke="#7c5cff" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <path d="M370 160 a80 100 0 0 1 0 140" fill="none" stroke="#7c5cff" stroke-width="12" stroke-linecap="round" opacity="0.35"/>
</svg>
